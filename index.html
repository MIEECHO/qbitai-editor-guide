<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="src/styles.css" />
  <title>编辑部新手攻略</title>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand"><strong>QbitAI</strong><span>编辑部</span></div>
      <nav aria-label="内容目录">
        <ul class="toc" id="toc"></ul>
      </nav>
    </aside>

    <main class="content">
      <div class="topbar">
        <label class="search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m21 21-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <input id="searchInput" type="search" placeholder="搜索定位、提纲、检查事项..." autocomplete="off" />
        </label>
        <div class="top-actions">
          <span id="moduleCount">0 个模块</span>
          <span id="wordCount">0 字原文</span>
        </div>
      </div>

      <section class="hero" id="home">
        <div>
          <h1 id="heroTitle">编辑部新手攻略</h1>
          <div id="heroIntro"></div>
          <div class="hero-actions">
            <button class="primary-btn" data-scroll="#section-0">继续学习 <span aria-hidden="true">→</span></button>
            <button class="ghost-btn" id="expandAll">展开全部</button>
          </div>
        </div>
        <aside class="hero-card">
          <h2>今天先抓住这 4 件事</h2>
          <ul class="mini-steps" id="heroFocus"></ul>
        </aside>
      </section>

      <div class="main-grid">
        <div class="modules" id="modules"></div>
        <aside class="utility-panel">
          <section class="side-card">
            <h3>发稿前检查清单</h3>
            <div class="checklist" id="checklist"></div>
          </section>
          <section class="side-card">
            <h3>常用资料</h3>
            <div class="resource-grid" id="resources"></div>
          </section>
        </aside>
      </div>

      <footer>
        <span id="sourceDocument">原始文档</span>
        <span id="sourceStamp">生成日期</span>
      </footer>
    </main>
  </div>
  <div class="toast" id="toast">已复制</div>

  <script src="src/render.js" defer></script>
</body>
</html>
